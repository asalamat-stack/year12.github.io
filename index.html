<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Year 12 BTEC IT Revision</title>

<style>

body{
font-family:Arial;
background:white;
margin:0;
text-align:center;
}

header{
background:linear-gradient(90deg,#2ecc71,#8e44ad);
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:750px;
margin:auto;
padding:30px;
}

.score{
font-size:20px;
margin-bottom:10px;
}

.progress{
font-size:16px;
margin-bottom:20px;
color:#666;
}

select{
padding:10px;
font-size:16px;
border-radius:8px;
border:2px solid #2ecc71;
margin-bottom:20px;
}

.question{
font-size:22px;
margin:20px 0;
color:black;
}

.option{
display:block;
width:100%;
margin:10px 0;
padding:14px;
font-size:16px;
border-radius:10px;
border:2px solid #8e44ad;
background:white;
color:black;
cursor:pointer;
}

.option:hover{
background:#f4ecff;
}

.correct{
background:#c8f7c5 !important;
border-color:#2ecc71 !important;
}

.wrong{
background:#ffd6d6 !important;
border-color:red !important;
}

button{
padding:12px 22px;
font-size:16px;
margin-top:15px;
border-radius:10px;
border:none;
background:#2ecc71;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<header>
Year 12 BTEC IT Revision Quiz
</header>

<div class="container">

<div class="score">
Score: <span id="score">0</span>
</div>

<div class="progress">
Remaining Questions: <span id="remaining">0</span>
</div>

<select id="topicFilter">
<option value="all">All Packs</option>
<option value="packA">Pack A - Digital Devices</option>
<option value="packB">Pack B - Transmitting Data</option>
<option value="packC">Pack C - Operating Online</option>
<option value="packD">Pack D - Protecting Data</option>
<option value="packE">Pack E - Impact of IT Systems</option>
<option value="packF">Pack F - Issues</option>
</select>

<div class="question" id="question"></div>

<div id="answers"></div>

<button onclick="nextQuestion()">Next</button>
<button onclick="restartQuiz()">Restart</button>

</div>

<script>

/* ==========================
QUESTION BANK
========================== */

const questions = [

/* ADD YOUR BTEC QUESTIONS HERE USING:
topic:"packA", "packB", etc */

    /* PACK A - DIGITAL DEVICES */

{topic:"packA",q:"What is a digital device?",o:["A device that processes data electronically","A mechanical device","A storage unit"],a:0},

{topic:"packA",q:"What is a personal computer?",o:["A general-purpose computer for everyday use","A device used only for gaming","A network server"],a:0},

{topic:"packA",q:"What is a multifunctional device?",o:["A device that performs multiple functions","A device that only prints","A device used for storage"],a:0},

{topic:"packA",q:"Which is an example of a mobile device?",o:["Smartphone","Desktop PC","Server"],a:0},

{topic:"packA",q:"What is a server?",o:["A computer that provides services to other devices","A personal laptop","A gaming console"],a:0},

{topic:"packA",q:"What does a file server do?",o:["Stores files for users","Runs games","Displays images"],a:0},

{topic:"packA",q:"What does a web server do?",o:["Hosts websites","Stores images only","Controls printers"],a:0},

{topic:"packA",q:"What does an application server do?",o:["Runs software for users","Stores files only","Controls hardware"],a:0},

{topic:"packA",q:"What is an entertainment system used for?",o:["Media and gaming","Data storage","Networking only"],a:0},

{topic:"packA",q:"What does a digital camera do?",o:["Captures images or video","Stores programs","Processes data"],a:0},

{topic:"packA",q:"What is a navigation system used for?",o:["Providing directions","Storing files","Editing videos"],a:0},

{topic:"packA",q:"What is a communication device used for?",o:["Sending and receiving data","Storing data","Running programs"],a:0},

{topic:"packA",q:"What is an embedded system?",o:["A computer built into a device to perform one task","A desktop computer","A network server"],a:0},

{topic:"packA",q:"What does a sensor do?",o:["Collects data from the environment","Displays data","Stores files"],a:0},

{topic:"packA",q:"What does IoT stand for?",o:["Internet of Things","Input of Technology","Interface of Tools"],a:0},

{topic:"packA",q:"What is IoT?",o:["Devices connected to the internet","Devices used offline only","Storage systems"],a:0},

{topic:"packA",q:"Which is a personal use of devices?",o:["Browsing the internet","Running a factory","Manufacturing goods"],a:0},

{topic:"packA",q:"Which is an educational use of devices?",o:["Online learning","Selling products","Automating machines"],a:0},

{topic:"packA",q:"Which is a retail use of devices?",o:["Online shopping","Editing videos","Writing code"],a:0},

{topic:"packA",q:"Which is a healthcare use of devices?",o:["Monitoring patients","Gaming","Printing documents"],a:0},

{topic:"packA",q:"Which is a creative use of devices?",o:["Editing videos","Sending emails only","Data storage"],a:0},

{topic:"packA",q:"Which is a manufacturing use?",o:["Automation in factories","Browsing websites","Social media"],a:0},

{topic:"packA",q:"What is a network diagram?",o:["A diagram showing how devices connect","A list of files","A type of software"],a:0},

{topic:"packA",q:"What is a flowchart?",o:["A diagram showing steps in a process","A network device","A storage type"],a:0},

{topic:"packA",q:"What is an input device?",o:["A device that sends data into a computer","A device that displays output","A storage device"],a:0},

{topic:"packA",q:"Which is an input device?",o:["Keyboard","Monitor","Printer"],a:0},

{topic:"packA",q:"What is an output device?",o:["A device that displays data","A device that inputs data","A storage device"],a:0},

{topic:"packA",q:"Which is an output device?",o:["Monitor","Mouse","Scanner"],a:0},

{topic:"packA",q:"What is a storage device?",o:["A device that stores data","A device that inputs data","A display device"],a:0},

{topic:"packA",q:"Which is a storage device?",o:["USB drive","Keyboard","Monitor"],a:0},

{topic:"packA",q:"What is assistive technology?",o:["Technology that helps people with disabilities","Technology for gaming","Technology for storage"],a:0},

{topic:"packA",q:"What does a screen reader do?",o:["Reads text aloud","Displays images","Stores data"],a:0},

{topic:"packA",q:"What does a braille display do?",o:["Displays text in braille","Prints documents","Stores files"],a:0},

{topic:"packA",q:"What does a screen magnifier do?",o:["Zooms in on screen","Deletes files","Stores data"],a:0},

{topic:"packA",q:"What does eye-tracking software do?",o:["Controls computer using eye movement","Stores images","Processes data"],a:0},

{topic:"packA",q:"What is storage capacity?",o:["Amount of data stored","Speed of device","Cost of device"],a:0},

{topic:"packA",q:"What does storage speed refer to?",o:["How fast data is read or written","How much data is stored","How expensive it is"],a:0},

{topic:"packA",q:"What is compatibility?",o:["Ability to work with other systems","Storage size","Speed of device"],a:0},

{topic:"packA",q:"What is manual processing?",o:["Processing done by humans","Processing done by computers","Processing done automatically"],a:0},

{topic:"packA",q:"What is automatic processing?",o:["Processing done by computers","Processing done by humans","Processing done manually"],a:0},

{topic:"packA",q:"What is an operating system?",o:["Software that manages hardware and software","A storage device","An input device"],a:0},

{topic:"packA",q:"Which is a type of operating system?",o:["Real-time OS","Word processor","Spreadsheet"],a:0},

{topic:"packA",q:"What is utility software?",o:["Software that maintains a computer","Software for writing documents","Software for gaming"],a:0},

{topic:"packA",q:"What is application software?",o:["Software used to perform tasks","Software that manages hardware","Storage software"],a:0},

{topic:"packA",q:"What is a graphical user interface (GUI)?",o:["Interface using icons and windows","Interface using commands only","A storage system"],a:0},

{topic:"packA",q:"What is a command line interface?",o:["Interface where commands are typed","Interface using icons","A network device"],a:0},

{topic:"packA",q:"What is open source software?",o:["Software that can be modified by users","Paid software","Hardware"],a:0},

{topic:"packA",q:"What is proprietary software?",o:["Software owned and controlled by a company","Free software","Open source software"],a:0},

{topic:"packA",q:"Which factor affects choice of IT systems?",o:["Cost","Colour","Shape"],a:0},

{topic:"packA",q:"Which factor affects performance of IT systems?",o:["Efficiency","Keyboard size","Mouse colour"],a:0},

{topic:"packA",q:"What is artificial intelligence (AI)?",o:["Machines that simulate human intelligence","A storage device","A network cable"],a:0}

];

/* ======================
QUIZ ENGINE
====================== */

let pool=[];
let score=0;
let current;

const qEl=document.getElementById("question");
const aEl=document.getElementById("answers");
const scoreEl=document.getElementById("score");
const remainEl=document.getElementById("remaining");
const filter=document.getElementById("topicFilter");

filter.addEventListener("change",startQuiz);

function startQuiz(){
    let topic=filter.value;

    pool=questions
        .filter(q=>topic==="all"||q.topic===topic)
        .map(q=>({...q,answered:false}));

    score=0;
    scoreEl.innerText=score;

    nextQuestion();
}

function nextQuestion(){

    if(pool.length===0){
        qEl.innerText="All questions answered correctly! 🎉";
        aEl.innerHTML="";
        remainEl.innerText=0;
        return;
    }

    current=pool[Math.floor(Math.random()*pool.length)];
    qEl.innerText=current.q;
    aEl.innerHTML="";
    remainEl.innerText=pool.length;

    let answers=current.o.map((text,index)=>({
        text:text,
        correct:index===current.a
    }));

    answers.sort(()=>Math.random()-0.5);

    answers.forEach(ans=>{
        let btn=document.createElement("button");
        btn.className="option";
        btn.innerText=ans.text;
        btn.onclick=()=>answer(ans.correct,btn);
        aEl.appendChild(btn);
    });
}

function answer(correct,btn){
    let buttons=document.querySelectorAll(".option");
    buttons.forEach(b=>b.disabled=true);

    if(correct){
        btn.classList.add("correct");
        score++;
        scoreEl.innerText=score;
        pool=pool.filter(q=>q!==current);
    } else{
        btn.classList.add("wrong");
        buttons.forEach(b=>{
            if(b.onclick.toString().includes("true")){
                b.classList.add("correct");
            }
        });
    }
}

function restartQuiz(){
    startQuiz();
}

startQuiz();

</script>

</body>
</html>
